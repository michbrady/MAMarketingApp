version: '3.8'

# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Requires these environment variables set in the shell or a .env.prod file:
#   REGISTRY, IMAGE_TAG, DB_HOST, DB_USER, DB_PASSWORD, DB_NAME,
#   REDIS_HOST, REDIS_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET,
#   FRONTEND_URL, BACKEND_URL, TRACKING_BASE_URL,
#   NEXT_PUBLIC_API_URL

services:
  sqlserver:
    # In production, SQL Server is Azure SQL Database — remove this service
    profiles: ["local-only"]

  backend:
    image: ${REGISTRY}/unfranchise-backend:${IMAGE_TAG:-latest}
    build:
      target: runner
    container_name: null
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    volumes: []
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=1433
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_ENCRYPT=true
      - DB_TRUST_SERVER_CERTIFICATE=false
      - UNFRANCHISE_DB_HOST=${UNFRANCHISE_DB_HOST}
      - UNFRANCHISE_DB_USER=${UNFRANCHISE_DB_USER}
      - UNFRANCHISE_DB_PASSWORD=${UNFRANCHISE_DB_PASSWORD}
      - UNFRANCHISE_DB_NAME=${UNFRANCHISE_DB_NAME}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6380
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=true
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - TRACKING_BASE_URL=${TRACKING_BASE_URL}
      - LOG_LEVEL=info
      - OAUTH_ENABLED=true
      - OAUTH_ENVIRONMENT=prod
    command: ["node", "dist/index.js"]

  frontend:
    image: ${REGISTRY}/unfranchise-frontend:${IMAGE_TAG:-latest}
    build:
      target: runner
    container_name: null
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    volumes: []
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
